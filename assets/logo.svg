<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Radar icon -->
  <g transform="translate(16, 12)">
    <!-- Outer ring -->
    <circle cx="48" cy="48" r="44" stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.3"/>
    <!-- Middle ring -->
    <circle cx="48" cy="48" r="30" stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.5"/>
    <!-- Inner ring -->
    <circle cx="48" cy="48" r="16" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="48" cy="48" r="5" fill="url(#accent)"/>
    <!-- Sweep line -->
    <line x1="48" y1="48" x2="88" y2="20" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Detected blips -->
    <circle cx="35" cy="28" r="3.5" fill="#22c55e" opacity="0.9"/>
    <circle cx="70" cy="38" r="3" fill="#f59e0b" opacity="0.9"/>
    <circle cx="58" cy="72" r="3" fill="#06b6d4" opacity="0.9"/>
  </g>
  <!-- Text -->
  <text x="128" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e0e0e0">
    conf<tspan fill="url(#accent)">radar</tspan>
  </text>
  <!-- Tagline -->
  <text x="130" y="98" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#666666" letter-spacing="0.5">
    see every config file in your project
  </text>
</svg>
